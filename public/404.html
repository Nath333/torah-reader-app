<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Torah Reader</title>
  <script type="text/javascript">
    // Single Page Apps for GitHub Pages
    // MIT License
    // https://github.com/rafgraph/spa-github-pages
    // This script handles redirects from 404 pages to the index.html
    // preserving the path in the URL for client-side routing
    var pathSegmentsToKeep = 1; // Keep repo name segment for GitHub Pages

    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body>
  <noscript>
    <h1>Torah Reader</h1>
    <p>JavaScript is required to run this application.</p>
    <p><a href="/">Go to homepage</a></p>
  </noscript>
</body>
</html>
